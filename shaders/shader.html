<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
// 1. Initialisation du contexte WebGL 2
const g = c.getContext('webgl2');

// 2. Vertex Shader (1 triangle plein écran via gl_VertexID)
const VS = `#version 300 es
void main() {
    gl_Position = vec4(vec2(gl_VertexID & 1, gl_VertexID >> 1) * 4. - 1., 0, 1);
}`;

// 3. Fragment Shader avec votre code intégré
const FS = `#version 300 es
precision highp float;

uniform float iTime;
uniform vec2 iResolution;
out vec4 fragColor;

#define PI 3.14159265

vec3 palette(in float t) {
    vec3 a = vec3(0.5, 0.5, 0.5);
    vec3 b = vec3(0.5, 0.5, 0.5);
    vec3 c = vec3(1.0, 1.0, 1.0);
    vec3 d = vec3(0.1, 0.4, 0.5);
    return a + b * cos(2.0 * PI * (c * t + d));
}

vec4 wave(vec2 uv, vec4 color, float amp, float freq, float phase, float thick, vec3 hue) {
    float x = uv.x - phase;
    float y = uv.y + amp * sin(freq * x);
    float bright = smoothstep(0.0, 1.0, 1.0 - abs(y) / thick);
    return vec4(vec3(bright) * hue, 1.0);
}

void mainImage(out vec4 color, in vec2 coord) {
    vec2 uv = (2.0 * coord - iResolution.xy) / iResolution.y;

    color = vec4(0.0, 0.0, 0.0, 1.0);

    for (float layer = 0.0; layer < 1.0; layer += 0.1) {
        float amp = 0.25 + 0.25 * sin(iTime + layer) * (1.0 - layer);
        float freq = 2.0;
        float phase = iTime * (1.0 - layer);
        float thick = 0.01 + 0.001 * pow(abs(uv.x), 8.0);
        vec3 hue = palette(0.5 * uv.x + 1.0 * layer - 0.5 * iTime);
        color += wave(uv, color, amp, freq, phase, thick, hue);
    }
}

// Passerelle entre WebGL2 (main) et le format Shadertoy (mainImage)
void main() {
    mainImage(fragColor, gl_FragCoord.xy);
}`;

// 4. Compilation et linkage
const p = g.createProgram();
[VS, FS].map((src, i) => {
    const s = g.createShader(35633 - i);
    g.shaderSource(s, src);
    g.compileShader(s);
    g.attachShader(p, s);
});
g.linkProgram(p);
g.useProgram(p);

// 5. Récupération des emplacements uniformes
const uTime = g.getUniformLocation(p, 'iTime');
const uRes = g.getUniformLocation(p, 'iResolution');

// 6. Boucle d'animation
(function loop(time) {
    if (c.width !== innerWidth || c.height !== innerHeight) {
        g.viewport(0, 0, c.width = innerWidth, c.height = innerHeight);
    }

    // Envoi des données iTime et iResolution au GPU
    g.uniform1f(uTime, time * 0.001);
    g.uniform2f(uRes, c.width, c.height);

    // Dessin
    g.drawArrays(g.TRIANGLES, 0, 3);

    requestAnimationFrame(loop);
})();
</script>
</body>
</html>
